<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab3"></ion-back-button>
    </ion-buttons>
    <ion-title>Liste des mouvements</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid>
    <ion-row *ngFor="let depense of this.depenses">
      <ion-col size="3">
        <ion-label>
          {{ depense.date | date : 'dd/MM/yyyy' }}
        </ion-label>
      </ion-col>
      <ion-col size="9">
        <ion-label>
          <h2 style="font-weight: bold;">{{ depense.montant }} xpf</h2>
          <h3>{{ depense.payeur }} - {{ depense.enseigne }}</h3>
          <p>{{ depense.description }}</p>
        </ion-label>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="goToDepensePage()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
