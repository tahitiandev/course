<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab3"></ion-back-button>
    </ion-buttons>
    <ion-title>Evolution des prix par article</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-item-sliding *ngFor="let article of articles">
      <ion-item (click)="getEvolutionPrix(article)">
        <ion-label>{{ article.libelle }}</ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option style="background: red; color:white">Effacer</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

</ion-content>
