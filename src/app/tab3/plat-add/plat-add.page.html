<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab3/plats"></ion-back-button>
    </ion-buttons>
    <ion-title>Ajouter un plat</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="slide-content">
  <br>
  <form [formGroup]="formgroup" (ngSubmit)="onSubmitForm()">


    <ion-slides #slides [options]="slideOpts" style="padding-top: 50%; padding-bottom: 50%;">

      <!-- SLIDE 1 -->
      <ion-slide >

        <ion-grid>
          <ion-row>
            <ion-col>
              <h1>Choisir<br>un nom du plat</h1>
              <h5>1/3</h5>
            </ion-col>
          </ion-row>
          <ion-row>
            <ion-col>
              <ion-item>
                <ion-input (click)="slideUn(slides)" id="slideUn" type="text" placeholder="Ecrire ici" formControlName="libelle" oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.substr(1);"></ion-input>
              </ion-item>
            </ion-col>
          </ion-row>
        </ion-grid>


      </ion-slide>

      <!-- SLIDE 2 -->
      <ion-slide>

        <ion-grid style="margin-top: -180px;">
          <ion-row>
            <ion-col (click)="slideNext(slides)">
              <h1>Sélectionner<br>les ingrédients</h1>
              <h5>2/3</h5>
            </ion-col>
          </ion-row>
          <ion-row>
            <ion-toolbar>
              <ion-searchbar (ionInput)="searchArticle($event)"></ion-searchbar>
            </ion-toolbar>
          </ion-row>
  
          <ion-row>
  
            <ion-list class="article-list" style="margin: 5%;width: 100%; height: 340px; overflow: scroll;">
              <ion-item id="testAricle-{{index}}" *ngFor="let article of articles; let index = index">
                  <ion-icon (click)="loadOneArticle(article, index)" slot="end" name="add-circle-outline"></ion-icon>
                <ion-label>{{ article.libelle }}</ion-label>
              </ion-item>
            </ion-list>
          </ion-row>








          <!-- <button style="position: fixed; bottom: 10px; left: 50px; z-index: 1;">test</button> -->
          
          <!-- <ion-row>
            <ion-col>
              <ion-button slot="end" color="primary" style="z-index: 9;">Primary</ion-button>
            </ion-col>
          </ion-row> -->

        </ion-grid>
  
      </ion-slide>

      <!-- SLIDE 5 -->
    <ion-slide >
      <ion-grid>
        <ion-row>
          <ion-col>
            <h1>Valider vos choix</h1>
            <h5>3/3</h5>
            <br>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col>
            <ion-button type="submit" color="primary">Oui</ion-button>
            <ion-button color="danger">Non</ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-slide>

</form>

</ion-content>
