<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab3"></ion-back-button>
    </ion-buttons>
    <ion-title>Famille de produit</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <br>
  <ion-list>
    <ion-item-sliding *ngFor="let famille of this.familles; let i = index">

      <ion-item button (click)="updateFamille(famille)">
        
        <ion-label>
          <h3>{{ famille.libelle }}</h3>
        </ion-label>

        <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option (click)="postFamille()">Ajouter</ion-item-option>
        <ion-item-option color="medium" (click)="updateFamille(famille)">Modifier</ion-item-option>
        <ion-item-option color="danger" (click)="deleteFamilleArticle(famille)">Supprimer</ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>


  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="this.onInit()">
      <ion-icon name="sync-outline"></ion-icon>
    </ion-fab-button>
    <br>
    <ion-fab-button (click)="postFamille()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>


</ion-content>
