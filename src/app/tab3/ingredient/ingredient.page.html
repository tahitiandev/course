<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab3/plats"></ion-back-button>
    </ion-buttons>
    <ion-title>Ingredient</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- <h1 style="text-align: center;">{{ this.platDetail.libelle}}</h1> -->





  <h1 style="text-align: center;">{{ this.libelle }}</h1>

  <ion-list *ngFor="let ingredient of this.ingredients">
    <ion-item button>
      <ion-label>
        <h3>{{ ingredient.code }} : {{ ingredient.libelle }} - {{ ingredient.prix }} xpf</h3>
      </ion-label>
    </ion-item>
  </ion-list>




  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button>
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
