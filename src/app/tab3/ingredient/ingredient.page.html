<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab3/plats"></ion-back-button>
    </ion-buttons>
    <ion-title>Ingredient</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- <h1 style="text-align: center;">{{ this.platDetail.libelle}}</h1> -->





  <h1 style="text-align: center;">{{ this.libelle }}</h1>

  <ion-list style="margin-top: 5%;">
    <ion-item-sliding *ngFor="let ingredient of ingredients; let index = index">
      <!-- <ion-item-options side="start">
        <ion-item-option >Modifier<br>article</ion-item-option>
      </ion-item-options> -->
        <ion-item>
          <ion-label>{{ ingredient.libelle }}</ion-label>
          <ion-label style="text-align: right;">{{ ingredient.prix }} xpf (x{{ ingredient.quantite }})</ion-label>
          <ion-label style="text-align: right;"> {{ ingredient.quantite != null ? (ingredient.quantite-0) * (ingredient.prix-0) : ingredient.prixUnitaire }} xpf</ion-label>
          <ion-checkbox style="margin-left: 30px;" ></ion-checkbox>
        </ion-item>
        <ion-item-options side="end">
          <ion-item-option (click)="updateQuantite(index)">Modifier</ion-item-option>
          <ion-item-option (click)="deleteArticle(ingredient)" color="danger" >Supprimer</ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>


  <ion-fab vertical="bottom" horizontal="end" edge slot="fixed" style="margin-bottom:40px">
    <ion-fab-button>
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
    <ion-fab-list side="top">
      <ion-fab-button (click)="addIngredientByBarreCode()">
        <ion-icon name="barcode-outline"></ion-icon>
      </ion-fab-button>
    </ion-fab-list>
    <ion-fab-list side="start">
      <ion-fab-button (click)="addIngredient()">
        <ion-icon name="pencil-outline"></ion-icon>
      </ion-fab-button>
    </ion-fab-list>
  </ion-fab>

</ion-content>
