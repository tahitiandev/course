<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Paramétrages
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="selector-to-display">



  <ion-item-group>

    <ion-item-divider>
      <ion-label>Paramètre généraux</ion-label>
    </ion-item-divider>

    <ion-item>
      <ion-label>Dark mode</ion-label>
      <ion-toggle [checked]="darkModeBtn"  slot="end" (ionChange)="toggletheme($event)"></ion-toggle>
    </ion-item>

  </ion-item-group>


  <ion-item-group>

    <ion-item-divider>
      <ion-label>Base de données</ion-label>
    </ion-item-divider>

    <ion-item button (click)="this.goToUrl('tab2','article-list')">
      <ion-label>
        <h3>Article</h3>
      </ion-label>
      <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
    </ion-item>

    <ion-item button (click)="this.goToUrl('tab3','famille-list')">
      <ion-label>
        <h3>Famille d'article</h3>
      </ion-label>
      <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
    </ion-item>

    <ion-item button (click)="this.goToUrl('tab3','plats')">
      <ion-label>
        <h3>Plats</h3>
      </ion-label>
      <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
    </ion-item>

    <ion-item button (click)="this.goToUrl('tab3','menu-list')">
      <ion-label>
        <h3>Historique des menus</h3>
      </ion-label>
      <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
    </ion-item>

  </ion-item-group>

  <ion-item-group>

    <ion-item-divider>
      <ion-label>Firebase</ion-label>
    </ion-item-divider>

    <ion-item button (click)="this.messagePostDataToFireBase()">
      <ion-label>
        <h3>Envoyer vos données</h3>
      </ion-label>
      <ion-icon name="paper-plane"></ion-icon>
    </ion-item>

    <ion-item button (click)="this.messageGetAllData()">
      <ion-label>
        <h3>Récupérer vos données</h3>
      </ion-label>
      <ion-icon name="sync"></ion-icon>
    </ion-item>

  </ion-item-group>

  <ion-item-group>

    <ion-item-divider>
      <ion-label>Configuration</ion-label>
    </ion-item-divider>

    <ion-item button (click)="this.budgetDeLaSemaine()">
      <ion-label>
        <h3>Budget</h3>
      </ion-label>

      {{setting.budget}} XPF
    </ion-item>

    <ion-item button (click)="this.listeDesPayeurs()">
      <ion-label>
        <h3>Payeurs</h3>
      </ion-label>
      <ion-icon name="menu-outline"></ion-icon>      
    </ion-item>

    <ion-item button (click)="this.listeDesTags()">
      <ion-label>
        <h3>TAG</h3>
      </ion-label>
      <ion-icon name="menu-outline"></ion-icon>      
    </ion-item>

  </ion-item-group>

  <span id="wait"></span>

  <!-- <img src="https://drive.google.com/uc?export=view&id=19wfKf1a3Lz5JM9h0laYYUxcWVQjYlrGR" alt="" srcset=""> -->
  
</ion-content>
