<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Paramétrages
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">



  <ion-item-group>

    <ion-item-divider>
      <ion-label>Paramètre généraux</ion-label>
    </ion-item-divider>

    <ion-item>
      <ion-label>Dark mode</ion-label>
      <ion-toggle [checked]="darkModeBtn"  slot="end" (ionChange)="toggletheme($event)"></ion-toggle>
    </ion-item>

  </ion-item-group>


  <ion-item-group>

    <ion-item-divider>
      <ion-label>Configurations</ion-label>
    </ion-item-divider>

    <ion-item button (click)="this.goToUrl('tab2','article-list')">
      <ion-label>
        <h3>Article</h3>
      </ion-label>
      <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
    </ion-item>

    <ion-item button (click)="this.goToUrl('tab3','famille-list')">
      <ion-label>
        <h3>Famille d'article</h3>
      </ion-label>
      <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
    </ion-item>

    <ion-item button (click)="this.goToUrl('tab3','plats')">
      <ion-label>
        <h3>Plats à préparer</h3>
      </ion-label>
      <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
    </ion-item>

  </ion-item-group>

</ion-content>
