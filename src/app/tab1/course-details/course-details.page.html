<ion-header translucent>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <ion-title>Liste de course</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="montantDesCourses">
    Total : {{ total }} XPF
  </div>

  <ion-list style="margin-top: 5%;">
    <ion-item-sliding *ngFor="let detail of listeArticle; let index = index">
      <ion-item-options side="start">
        <ion-item-option >Modifier<br>article</ion-item-option>
      </ion-item-options>
      
      <ion-item>
        <ion-label>{{ detail.libelle }}</ion-label>
        <!-- <ion-label style="text-align: right;">Qté:{{ detail.quantite === null ? detail.quantite : 1 }}</ion-label> -->
        <ion-label style="text-align: right;">{{ detail.prixUnitaire }} xpf (x{{ detail.quantite != null ? detail.quantite : 1 }})</ion-label>
        <ion-label style="text-align: right;"> {{ detail.quantite != null ? (detail.quantite-0) * (detail.prixUnitaire-0) : detail.prixUnitaire }} xpf</ion-label>
        <ion-checkbox style="margin-left: 30px;" (click)="clickCheckBox(index)" [checked]="detail.actif"></ion-checkbox>
      </ion-item>
      
      <ion-item-options side="end">
        <ion-item-option (click)="updateArticle(detail, index)">Modifier</ion-item-option>
        <ion-item-option (click)="supprimerArticle(index)" color="danger" >Supprimer</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" edge slot="fixed" style="margin-bottom:40px">
    <ion-fab-button>
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
    <ion-fab-list side="top">
      <ion-fab-button (click)="checkArticle()">
        <ion-icon name="checkmark-outline"></ion-icon> 
      </ion-fab-button>
      <ion-fab-button (click)="postNewArticleInCourse('barreCode')">
        <ion-icon name="barcode-outline"></ion-icon> 
      </ion-fab-button>
      <ion-fab-button (click)="postNewArticleInCourse('rafale')">
        <ion-icon name="barcode-outline"></ion-icon>
        <ion-icon name="barcode-outline"></ion-icon>
      </ion-fab-button>
    </ion-fab-list>


    <ion-fab-list side="start">
      <ion-fab-button (click)="postNewArticleInCourse('manuel')">
        <ion-icon name="pencil-outline"></ion-icon>
      </ion-fab-button>
      
      <ion-fab-button (click)="insertSpecialArticle()">
        <ion-icon name="pencil-outline"></ion-icon>
        <ion-icon name="pencil-outline"></ion-icon>
      </ion-fab-button>

      <ion-fab-button (click)="insertPlat()">
        <ion-icon name="pizza-outline"></ion-icon>
      </ion-fab-button>
      
      <ion-fab-button (click)="actualiser()">
        <ion-icon name="reload-outline"></ion-icon>
      </ion-fab-button>
    </ion-fab-list>
  </ion-fab>


</ion-content>
