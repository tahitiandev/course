<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <ion-title>Créer une liste de course</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <form [formGroup]="courseForm" (ngSubmit)="onSubmit()">

    <ion-item-group>
      <ion-item-divider>
        <ion-label><h2>Informations générales</h2></ion-label>
      </ion-item-divider>
      <ion-item>
        <ion-label>Date</ion-label>
        <ion-datetime formControlName="date" value="1990-02-19" placeholder="Choisir une date"></ion-datetime>
      </ion-item>
      
      <ion-item>
        <ion-label position="floating">Libelle</ion-label>
        <ion-input formControlName="libelle"></ion-input>
      </ion-item>
      <br>
      <section>
        <ion-button type="submit" expand="block">Enregistrer</ion-button>
      </section>

    </ion-item-group>


    <ion-item-group>
      <ion-item-divider>
        <ion-label><h2>Sélectionner un article</h2></ion-label>
      </ion-item-divider>
      <ion-item>
        <ion-label>Ajouter un article</ion-label>
        <ion-select formControlName="article" placeholder="Selectionner un article">
          <ion-select-option
            *ngFor="let article of articles"
            value="{{article.code}}">{{article.libelle}}</ion-select-option>
        </ion-select>

        <ion-button (click)="loadArticle()" slot="end" color="success">
          <ion-icon name="checkmark-outline"></ion-icon>
        </ion-button>

      </ion-item>

      <ion-item>
        <ion-label>Ajouter des articles à partir d'un plat</ion-label>
        <ion-select formControlName="platToArticles" placeholder="Selectionner un plat">
          <ion-select-option 
            *ngFor="let plat of plats" 
            value="{{plat.libelle}}">
            {{ plat.libelle }}</ion-select-option>
        </ion-select>

        <ion-button (click)="loadArticleFromPlat()" slot="end" color="success">
          <ion-icon name="checkmark-outline"></ion-icon>
        </ion-button>

      </ion-item>

    </ion-item-group>


    <ion-item-group>
      <ion-item-divider>
        <ion-label>Liste des articles ajoutés</ion-label>
      </ion-item-divider>

      <ion-list *ngIf="listeArticle">
        <ion-item *ngFor="let article of listeArticle">
          <ion-label>{{ article.libelle }}</ion-label>
        </ion-item>
      </ion-list>
      
    </ion-item-group>

  </form>


</ion-content>
