<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab3"></ion-back-button>
    </ion-buttons>
    <ion-title>
      Les articles
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  
  <br>
  <ion-list>
    <ion-item-sliding *ngFor="let article of this.articles; let i = index">
    
      <!-- <ion-item button (click)="goDetail(i)"> -->
      <ion-item button (click)="modifierUnArticle(article)">
      <!-- <ion-item> -->
        <ion-label>
          <h3>{{ article.code }} {{ article.libelle }}</h3>
        </ion-label>
        <h5 slot="end">{{ article.prix }} xpf</h5>
        <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option (click)="AjouterUnArticle()">Ajouter</ion-item-option>
        <ion-item-option color="danger" (click)="modifierUnArticle(article)">Modifier</ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>


  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="goToArticleAdd()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
